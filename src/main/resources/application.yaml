db:
  ssu-bench:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

server:
  port: 8080
  shutdown: graceful
  tomcat:
    connection-timeout: 5s
    keep-alive-timeout: 15s

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    url: /openapi.yaml
    operationsSorter: method
    tagsSorter: alpha

security:
  jwt:
    secret: ${JWT_SECRET:ssubench-dev-secret-change-me}
    issuer: ssu-bench
    expiration: 24h